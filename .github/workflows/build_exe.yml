name: Build Windows EXE

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances
        run: |
          pip install yt-dlp pyinstaller

      - name: Creer le fichier EXE
        run: |
          pyinstaller --onedir --windowed --name "YouTubeDownloader" downloader.py
          Compress-Archive -Path dist/YouTubeDownloader -DestinationPath dist/YouTubeDownloader-Windows.zip
        shell: pwsh

      - name: Tester le EXE
        run: |
          $process = Start-Process -FilePath "dist\YouTubeDownloader\YouTubeDownloader.exe" -ArgumentList "--test" -Wait -PassThru -NoNewWindow
          if ($process.ExitCode -ne 0) {
            Write-Error "Le EXE a retourne le code d'erreur : $($process.ExitCode)"
            exit 1
          }
          Write-Host "TEST PASSE : le EXE fonctionne correctement"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeDownloader-Windows
          path: dist/YouTubeDownloader-Windows.zip

      - name: Creer une release GitHub
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: latest
          name: "YouTube Downloader - Derniere version"
          body: |
            ## Telecharger le logiciel pour Windows

            Clique sur **YouTubeDownloader-Windows.zip** ci-dessous pour telecharger.

            ### Installation
            1. Telecharge et extrais `YouTubeDownloader-Windows.zip`
            2. Ouvre le dossier `YouTubeDownloader`
            3. Double-clique sur `YouTubeDownloader.exe` pour lancer

            > Demarrage rapide (pas de chargement a chaque lancement)
            > Pour la meilleure qualite video, installe aussi ffmpeg :
            > `winget install Gyan.FFmpeg`
          files: dist/YouTubeDownloader-Windows.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
